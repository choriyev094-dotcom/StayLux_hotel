<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking | StayLux</title>

    <link rel="stylesheet" href="../assets/css/style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>

<body>

    <!-- HEADER -->

    <header class="header">

        <div class="container">

            <nav class="navbar">

                <a href="../index.html" class="logo">
                    Stay<span>Lux</span>
                </a>

                <ul class="nav-menu">
                    <li><a href="../index.html">Home</a></li>
                    <li><a href="hotels.html">Hotels</a></li>
                    <li><a href="about.html">About</a></li>
                    <li><a href="contact.html">Contact</a></li>
                </ul>

                <div class="nav-btns">
                    <a href="login.html" class="login-btn">Login</a>
                    <a href="booking.html" class="book-btn">Book Now</a>
                </div>

            </nav>

        </div>

    </header>

    <!-- BOOKING -->

    <section class="booking-page">

        <div class="container">

            <div class="booking-box">

                <h1>Book Your Stay</h1>

                <p>Reserve your luxury room in just a few steps.</p>

                <form id="bookingForm">

                    <div class="input-group">

                        <label>Full Name</label>

                        <input
                            type="text"
                            id="fullName"
                            placeholder="Enter your full name"
                            required>

                    </div>

                    <div class="input-group">

                        <label>Email</label>

                        <input
                            type="email"
                            id="email"
                            placeholder="Enter your email"
                            required>

                    </div>

                    <div class="input-group">

                        <label>Check In</label>

                        <input
                            type="date"
                            id="checkIn"
                            required>

                    </div>

                    <div class="input-group">

                        <label>Check Out</label>

                        <input
                            type="date"
                            id="checkOut"
                            required>

                    </div>

                    <div class="input-group">

                        <label>Guests</label>

                        <select id="guests">

                            <option value="1">1 Guest</option>
                            <option value="2">2 Guests</option>
                            <option value="3">3 Guests</option>
                            <option value="4">4 Guests</option>

                        </select>

                    </div>

                    <div class="input-group">

                        <label>Room Type</label>

                        <select id="room">

                            <option value="180">
                                Deluxe Room ($180 / Night)
                            </option>

                            <option value="250">
                                Luxury Suite ($250 / Night)
                            </option>

                            <option value="350">
                                Presidential Suite ($350 / Night)
                            </option>

                        </select>

                    </div>
                    <div class="total-price">

                        Total:
                        <span id="price">$180</span>

                    </div>

                    <button
                        type="submit"
                        class="book-btn">

                        Confirm Booking

                    </button>

                    <a href="booking-history.html" class="login-btn">

                        My Bookings

                    </a>

                </form>

            </div>

        </div>

    </section>

    <button id="backToTop" class="back-to-top">

        <i class="fa-solid fa-arrow-up"></i>

    </button>

    <div id="toast" class="toast">

        <span id="toastMessage"></span>

    </div>

    <script src="../assets/js/main.js"></script>
    <script src="../assets/js/booking.js"></script>
    <script src="../assets/js/backToTop.js"></script>

</body>

</html>
