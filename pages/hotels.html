<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Hotels | StayLux</title>

    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/responsive.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>

<body>

    
    <!-- Header -->

    <header class="header">

        <div class="container">

            <nav class="navbar">

                <a href="../index.html" class="logo">
                    Stay<span>Lux</span>
                </a>

                <ul class="nav-menu">

                    <li><a href="../index.html">Home</a></li>

                    <li><a href="hotels.html" class="active">Hotels</a></li>

                    <li><a href="about.html">About</a></li>

                    <li><a href="contact.html">Contact</a></li>

                </ul>

                <div class="nav-btns">

                    <a href="login.html" class="login-btn">
                        Login
                    </a>

                    <a href="booking.html" class="book-btn">
                        Book Now
                    </a>

                </div>

            </nav>

        </div>

    </header>

    <!-- Hotels -->
    <section class="hotels-page">

    <div class="container">

        <div class="page-header">

            <h1>Our Hotels</h1>

            <p>
                Discover the world's finest luxury hotels and enjoy unforgettable experiences.
            </p>

        </div>

        <!-- Search Input -->
        <div class="search-bar">
            <input
                type="text"
                id="searchInput"
                placeholder="Search luxury hotels..."
            >
        </div>

        <div class="filter-box">

    <select id="priceFilter">
        <option value="all">All Prices</option>
        <option value="200">Under $200</option>
        <option value="300">Under $300</option>
    </select>

    <select id="ratingFilter">
        <option value="0">All Ratings</option>
        <option value="4">4★ & Above</option>
        <option value="5">5★ Only</option>
    </select>

</div>

        <!-- Hotel Cards -->
        <div id="hotelGrid"></div>

    </div>

</section>

<script src="../assets/js/hotels.js"></script>
<script src="../assets/js/search.js"></script>
<script src="../assets/js/filter.js"></script>
<script src="../assets/js/favorites.js"></script>
<script src="../assets/js/main.js"></script>
<script src="../assets/js/backToTop.js"></script>

<button id="backToTop" class="back-to-top">

    <i class="fa-solid fa-arrow-up"></i>

</button>

</body>

</html>
